version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8
    commands:
      - echo "Installing Maven..."
      - yum install -y maven
  
  build:
    commands:
      - echo "Building the application..."
      - mvn package
  
  post_build:
    commands:
      - echo "Build completed..."
      - mv target/*.war webapp.war

artifacts:
  files:
    - webapp.war
    - appspec.yml
    - scripts/**/*