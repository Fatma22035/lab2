version: 0.2

phases:
  install:
    runtime-versions:
      java: corretto8
    commands:
      - echo "Installing Maven..."
      - yum install -y maven
  
  build:
    commands:
      - echo "Building the application..."
      - mvn clean package
  
  post_build:
    commands:
      - echo "Build completed successfully!"
      - ls -la target/

artifacts:
  files:
    - target/lab2-webapp.war
    - appspec.yml
    - scripts/**/*